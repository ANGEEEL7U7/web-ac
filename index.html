<!doctype html>
<html lang="en">
  <head>
    <!--Css-->
    <style data-loader="true">
      body {
        margin: 0;
        padding: 0;
      }
      html.dark > body > #init-load,
      body,
      html {
        background: #141823;
      }

      html > body > #init-load,
      body,
      html {
        background: #f0f4ff;
      }
      #init-load {
        display: flex;
        flex-direction: column;
        position: fixed;
        color: black;
        z-index: 1000;
        min-height: 100svh;
        width: 100%;
        align-items: center;
        justify-content: center;
      }

      .spinner {
        width: 70.4px;
        height: 70.4px;
        animation: spinner-y0fdc1 2.4s infinite ease;
        transform-style: preserve-3d;
      }

      .spinner > div {
        background-color: rgba(71, 75, 255, 0.2);
        height: 100%;
        position: absolute;
        width: 100%;
        border: 3.5px solid #3a57f0;
      }

      .spinner div:nth-of-type(1) {
        transform: translateZ(-35.2px) rotateY(180deg);
      }

      .spinner div:nth-of-type(2) {
        transform: rotateY(-270deg) translateX(50%);
        transform-origin: top right;
      }

      .spinner div:nth-of-type(3) {
        transform: rotateY(270deg) translateX(-50%);
        transform-origin: center left;
      }

      .spinner div:nth-of-type(4) {
        transform: rotateX(90deg) translateY(-50%);
        transform-origin: top center;
      }

      .spinner div:nth-of-type(5) {
        transform: rotateX(-90deg) translateY(50%);
        transform-origin: bottom center;
      }

      .spinner div:nth-of-type(6) {
        transform: translateZ(35.2px);
      }

      @keyframes spinner-y0fdc1 {
        0% {
          transform: rotate(45deg) rotateX(-25deg) rotateY(25deg);
        }

        50% {
          transform: rotate(45deg) rotateX(-385deg) rotateY(25deg);
        }

        100% {
          transform: rotate(45deg) rotateX(-385deg) rotateY(385deg);
        }
      }
    </style>
    <!--Css-->

    <!--Scripts-->
    <script data-loader="true">
      (() => {
        const IS_DARK = window.matchMedia(
          "(prefers-color-scheme: dark)",
        ).matches;
        function getCookie(cname) {
          let name = cname + "=";
          let cookies = decodeURIComponent(document.cookie).split(";");
          for (let i = 0; i < cookies.length; i++) {
            let cookie = cookies[i];
            while (cookie.charAt(0) == " ") cookie = cookie.substring(1);
            if (cookie.indexOf(name) == 0)
              return cookie.substring(name.length, cookie.length);
          }
          return;
        }
        const mode = getCookie("mode");
        document.documentElement.classList.toggle(
          "dark",
          mode ? mode === "dark" : IS_DARK,
        );

        let counter = 0;
        let load = !1;
        const httpFetch = window.fetch;

        const handLoad = () => {
          const loader = document.getElementById("init-load");
          const app = document.getElementById("application");

          if (counter <= 0 && load && loader && app) {
            setTimeout(() => {
              loader.setAttribute(
                "style",
                "transition: opacity 2s ease; opacity:0",
              );
              loader.addEventListener(
                "transitionend",
                () => {
                  loader.remove();
                  document
                    .querySelectorAll('[data-loader="true"]')
                    .forEach((element) => element.remove());
                },
                { once: true },
              );
            }, 2000);
          }
        };

        window.fetch = function () {
          counter++;
          handLoad();
          return httpFetch.apply(this, arguments).finally(() => {
            counter--;
            handLoad();
          });
        };

        window.addEventListener("load", () => {
          load = true;
          handLoad();
        });
      })();
    </script>
    <!--Scripts-->
