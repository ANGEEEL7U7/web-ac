  <!--Scripts-->
  <script data-loader="true">
    (()=> document.documentElement.classList.toggle('dark',window.matchMedia("(pointer: coarse)").matches))();
    (() => {
      let counter = 0;
      let load = !1;
      const httpFetch = window.fetch;

      const handLoad = () => {
        const loader = document.getElementById('global-loader');
        if(counter > 0 && !load && !loader) return;
        setTimeout(() => {
            loader.setAttribute('style','transition: opacity 1s ease; opacity:0');
            loader.addEventListener('transitionend', () => {
              loader.remove();
              document.querySelectorAll('[data-loader="true"]').forEach(element => element.remove())
            }, { once: true });
          }, 2000)
      }

      window.fetch = function () {
        counter++;
        return httpFetch.apply(this,arguments).finally(() => {
          counter--;
          handLoad();
        });
      }

      window.addEventListener('load', () => {
        load = true;
        handLoad();
      })
    })();
  </script>
