  <body>

    <!--pantalla de carga-->
    <div id="global-loader">
      
      <script>
        window.addEventListener("load", () => {
          const load = document.getElementById("global-loader");
          if (!load) return;
          load.style.opacity = 0;
          load.style.transition = "opacity 3s ease";
          load.addEventListener("transitionend", () => {
            load.remove();
            document.body.style.removeProperty("overflow");
          });
        });
      </script>
      <style>
        body {
          overflow: hidden;
        }
      </style>
      <div>
        <div class="spinner">
          <div></div>
          <div></div>
          <div></div>
          <div></div>
          <div></div>
          <div></div>
        </div>
      </div>
    </div>
